# ==============================================================
# Zerto SIEM Bridge — CEF parsing + ECS normalisation
#
# Zerto ZVM emits RFC-5424 syslog with a CEF payload:
#   <PRI>TIMESTAMP HOSTNAME CEF:0|Zerto|ZVM|VERSION|EVENT_ID|EVENT_NAME|SEV|ext
#
# Extensions (key=value) vary by event type. Common fields:
#   vpgName, vmName, siteName, alertType, entityType, entityName,
#   description, rpoInSeconds, journalUsedStorageGb, src, dst
# ==============================================================

# --------------------------------------------------------------
# Step 1: Parse raw syslog envelope + extract CEF header fields
# --------------------------------------------------------------
<filter zerto.raw>
  @type parser
  @id   parse_cef_envelope
  key_name message
  reserve_data true
  inject_key_prefix raw.

  <parse>
    @type regexp
    # Matches: <PRI>TIMESTAMP HOSTNAME CEF:0|Zerto|ZVM|VER|ID|NAME|SEV|extensions
    expression /^(?:<\d+>)?(?:\d{4}-\d{2}-\d{2}T[\d:\.]+Z?\s+|\w{3}\s+\d{1,2}\s+[\d:]+\s+)?(?<host\.name>[^\s]+)\s+CEF:(?<cef\.version>\d+)\|(?<observer\.vendor>[^|]+)\|(?<observer\.product>[^|]+)\|(?<observer\.version>[^|]+)\|(?<event\.code>[^|]+)\|(?<event\.action>[^|]+)\|(?<event\.severity_raw>\d+)\|(?<cef\.extensions>.*)$/
  </parse>
</filter>

# --------------------------------------------------------------
# Step 2: Drop anything that isn't a Zerto CEF message
# --------------------------------------------------------------
<filter zerto.raw>
  @type grep
  <regexp>
    key observer.vendor
    pattern /^Zerto$/i
  </regexp>
</filter>

# --------------------------------------------------------------
# Step 3: Parse CEF extension key=value pairs into flat fields
# --------------------------------------------------------------
<filter zerto.raw>
  @type record_modifier
  @id   parse_cef_extensions
  enable_ruby true

  <record>
    # Parse space-separated key=value, handling quoted values
    __ext__ ${
      ext = {}
      kv_str = record['cef.extensions'] || ''
      kv_str.scan(/(\w+)=((?:[^\s\\]|\\.)+)/) do |k, v|
        ext[k] = v.gsub(/\\=/, '=').gsub(/\\\\/, '\\')
      end
      ext
    }
  </record>
</filter>

# --------------------------------------------------------------
# Step 4: Map CEF extensions → ECS fields
# --------------------------------------------------------------
<filter zerto.raw>
  @type record_transformer
  @id   ecs_map
  enable_ruby true

  <record>
    # --- ECS Core ---
    "@timestamp"              ${time.strftime('%Y-%m-%dT%H:%M:%S.%LZ')}
    "ecs.version"             "8.11.0"
    "event.dataset"           "zerto.event"
    "event.module"            "zerto"
    "observer.vendor"         ${record['observer.vendor']}
    "observer.product"        ${record['observer.product']}
    "observer.version"        ${record['observer.version']}
    "host.name"               ${record['host.name']}
    "event.code"              ${record['event.code']}
    "event.action"            ${record['event.action']}

    # Map CEF severity (0-10) to ECS numeric severity and text
    "event.severity"          ${(record['event.severity_raw'] || '0').to_i * 10}
    "log.level"               ${
      sev = (record['event.severity_raw'] || '0').to_i
      case sev
      when 0..3  then 'informational'
      when 4..6  then 'warning'
      when 7..8  then 'error'
      else            'critical'
      end
    }

    # --- Zerto-specific fields (under labels namespace) ---
    "labels.vpg_name"         ${(record['__ext__'] || {})['vpgName']}
    "labels.vm_name"          ${(record['__ext__'] || {})['vmName']}
    "labels.site_name"        ${(record['__ext__'] || {})['siteName']}
    "labels.zorg_name"        ${(record['__ext__'] || {})['zorgName']}
    "labels.alert_type"       ${(record['__ext__'] || {})['alertType']}
    "labels.entity_type"      ${(record['__ext__'] || {})['entityType']}
    "labels.entity_name"      ${(record['__ext__'] || {})['entityName']}
    "labels.rpo_seconds"      ${(record['__ext__'] || {})['rpoInSeconds']}
    "labels.rpo_threshold"    ${(record['__ext__'] || {})['rpoThreshold']}
    "labels.journal_used_gb"  ${(record['__ext__'] || {})['journalUsedStorageGb']}
    "labels.journal_limit_gb" ${(record['__ext__'] || {})['journalHardLimitGb']}
    "labels.recovery_type"    ${(record['__ext__'] || {})['recoveryType']}
    "labels.failover_type"    ${(record['__ext__'] || {})['failoverType']}
    "labels.affected_volumes" ${(record['__ext__'] || {})['volumes']}

    # --- Network (if present) ---
    "source.ip"               ${(record['__ext__'] || {})['src']}
    "destination.ip"          ${(record['__ext__'] || {})['dst']}
    "source.user.name"        ${(record['__ext__'] || {})['suser']}

    # --- Message ---
    "message"                 ${(record['__ext__'] || {})['msg'] || record['event.action']}
  </record>

  # Remove intermediate fields
  remove_keys __ext__, cef.extensions, event.severity_raw, raw.message
</filter>

# --------------------------------------------------------------
# Step 5: Route by Zerto event.code → semantic tags
# (mirrors the Alletra rewrite-tag-filter pattern)
# --------------------------------------------------------------
<match zerto.raw>
  @type rewrite_tag_filter
  @id   route_by_event_code

  # VPG lifecycle
  <rule>
    key   event.code
    pattern /^(VPG_CREATED|VPG_DELETED|VPG_UPDATED|VPG_PROTECTION_STATE_CHANGED|VPG_STATUS_CHANGED|VPG_SUBSTATUS_CHANGED|VPG_PRIORITY_CHANGED|VPG_PAUSED|VPG_RESUMED|VPG_BACKUP_COMPLETED|VPG_INITIAL_SYNC_COMPLETED)$/i
    tag   zerto.event.vpg.lifecycle
  </rule>

  # RPO / SLA violations — high priority
  <rule>
    key   event.code
    pattern /^(VPG_RPO_VIOLATION|VPG_RPO_WARNING|SLA_VIOLATION|VPG_RPO_RESTORED|VPG_HISTORY_NOT_MEETING_SLA)$/i
    tag   zerto.event.vpg.rpo_violation
  </rule>

  # Journal events
  <rule>
    key   event.code
    pattern /^(JOURNAL_HARD_LIMIT_REACHED|JOURNAL_SOFT_LIMIT_REACHED|JOURNAL_FULL|JOURNAL_BREACH|JOURNAL_LIMITATION_REMOVED|JOURNAL_SIZE_LIMITED)$/i
    tag   zerto.event.journal.limit
  </rule>

  # Failover / DR operations
  <rule>
    key   event.code
    pattern /^(FAILOVER_STARTED|FAILOVER_COMPLETED|FAILOVER_FAILED|MOVE_STARTED|MOVE_COMPLETED|MOVE_FAILED|TEST_FAILOVER_STARTED|TEST_FAILOVER_COMPLETED|TEST_FAILOVER_FAILED|TEST_FAILOVER_STOPPED|FAILOVER_COMMIT|FAILOVER_ROLLBACK|FAILOVER_ROLLBACK_COMPLETED)$/i
    tag   zerto.event.dr.operation
  </rule>

  # Restore operations (FLR, clone, scratch)
  <rule>
    key   event.code
    pattern /^(RESTORE_STARTED|RESTORE_COMPLETED|RESTORE_FAILED|CLONE_STARTED|CLONE_COMPLETED|CLONE_FAILED|FLR_STARTED|FLR_COMPLETED|FLR_FAILED|SCRATCH_VOLUME_CREATED|SCRATCH_VOLUME_DELETED)$/i
    tag   zerto.event.dr.restore
  </rule>

  # Authentication / user events
  <rule>
    key   event.code
    pattern /^(USER_LOGIN|USER_LOGOUT|USER_LOGIN_FAILED|USER_CREATED|USER_DELETED|USER_MODIFIED|USER_ROLE_CHANGED|USER_SESSION_EXPIRED|USER_LOCKED|USER_UNLOCKED)$/i
    tag   zerto.event.auth
  </rule>

  # Configuration changes
  <rule>
    key   event.code
    pattern /^(CONFIG_CHANGED|LICENSE_CHANGED|LICENSE_EXPIRED|LICENSE_WARNING|SITE_PAIRING_CHANGED|ZVM_SETTINGS_CHANGED|ZVM_UPGRADED|REPOSITORY_CHANGED|RETENTION_POLICY_CHANGED|NETWORK_CHANGED)$/i
    tag   zerto.event.config
  </rule>

  # Encryption / ransomware detection (Zerto alert codes ENC0001+)
  <rule>
    key   event.code
    pattern /^ENC\d{4}$/i
    tag   zerto.event.security.encryption
  </rule>

  # Alerts / warnings
  <rule>
    key   event.code
    pattern /^(ALERT_RAISED|ALERT_CLEARED|WARNING_RAISED|ALERT_TURNED_OFF|ALERT_TURNED_ON)$/i
    tag   zerto.event.alert
  </rule>

  # VRA lifecycle
  <rule>
    key   event.code
    pattern /^(VRA_INSTALLED|VRA_UNINSTALLED|VRA_UPGRADED|VRA_INSTALL_FAILED|VRA_UPGRADE_FAILED|VRA_IP_CHANGED|VRA_NETWORK_CHANGED|VRA_RECONNECTED|VRA_NOT_RESPONDING)$/i
    tag   zerto.event.vra
  </rule>

  # Connectivity (sites + VRAs)
  <rule>
    key   event.code
    pattern /^(SITE_CONNECTED|SITE_DISCONNECTED|SITE_PAIRED|SITE_UNPAIRED|SITE_SYNC_STARTED|SITE_SYNC_COMPLETED|VRA_CONNECTED|VRA_DISCONNECTED|PEER_SITE_CONNECTED|PEER_SITE_DISCONNECTED)$/i
    tag   zerto.event.connectivity
  </rule>

  # Replication state changes
  <rule>
    key   event.code
    pattern /^(REPLICATION_PAUSED|REPLICATION_RESUMED|REPLICATION_DELTA_SYNC|REPLICATION_BITMAP_SYNC|REPLICATION_ERROR|INITIAL_SYNC_STARTED|INITIAL_SYNC_COMPLETED|INITIAL_SYNC_FAILED)$/i
    tag   zerto.event.replication
  </rule>

  # Long-term retention (LTR) / repository
  <rule>
    key   event.code
    pattern /^(LTR_BACKUP_STARTED|LTR_BACKUP_COMPLETED|LTR_BACKUP_FAILED|LTR_RESTORE_STARTED|LTR_RESTORE_COMPLETED|LTR_RESTORE_FAILED|LTR_RETENTION_EXPIRED|REPOSITORY_FULL|REPOSITORY_NEAR_FULL)$/i
    tag   zerto.event.ltr
  </rule>

  # Task / workflow events
  <rule>
    key   event.code
    pattern /^(TASK_STARTED|TASK_COMPLETED|TASK_FAILED|TASK_CANCELLED|TASK_WARNING)$/i
    tag   zerto.event.task
  </rule>

  # Catch-all
  <rule>
    key   event.code
    pattern /.*/
    tag   zerto.event.other
  </rule>
</match>

# --------------------------------------------------------------
# Step 6: Enrich with event.kind / event.category by tag
# (adds SIEM-friendly classification after routing)
# --------------------------------------------------------------
<filter zerto.event.vpg.rpo_violation>
  @type record_transformer
  <record>
    "event.kind"     "alert"
    "event.category" ["network","storage"]
    "event.type"     ["info"]
    "rule.category"  "rpo_violation"
  </record>
</filter>

<filter zerto.event.journal.limit>
  @type record_transformer
  <record>
    "event.kind"     "alert"
    "event.category" ["storage"]
    "event.type"     ["info"]
    "rule.category"  "journal_limit"
  </record>
</filter>

<filter zerto.event.dr.operation>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["process"]
    "event.type"     ["change"]
  </record>
</filter>

<filter zerto.event.auth>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["authentication","iam"]
    "event.type"     ["start"]
  </record>
</filter>

<filter zerto.event.auth>
  @type record_transformer
  enable_ruby true
  <record>
    "event.outcome"  ${record['event.code'] =~ /FAILED/i ? 'failure' : 'success'}
    "event.kind"     ${record['event.code'] =~ /FAILED/i ? 'alert' : 'event'}
  </record>
</filter>

<filter zerto.event.config>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["configuration"]
    "event.type"     ["change"]
  </record>
</filter>

<filter zerto.event.security.encryption>
  @type record_transformer
  enable_ruby true
  <record>
    "event.kind"              "alert"
    "event.category"          ["malware","intrusion_detection"]
    "event.type"              ["indicator"]
    "rule.category"           "encryption_detection"
    "rule.name"               "Zerto Encryption Detection"
    "rule.description"        "Abnormal encryption behavior detected — potential ransomware. Investigate and restore affected VPGs to the clean checkpoint if confirmed."
    "rule.reference"          "https://help.zerto.com/bundle/Alarms.Alerts.HTML/page/ENC0001.htm"
    "threat.indicator.type"   "encryption-anomaly"
    "threat.technique.name"   "Data Encrypted for Impact"
  </record>
</filter>

<filter zerto.event.alert>
  @type record_transformer
  <record>
    "event.kind"     "alert"
    "event.category" ["network"]
    "event.type"     ["indicator"]
  </record>
</filter>

<filter zerto.event.connectivity>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["network"]
    "event.type"     ["connection"]
  </record>
</filter>

<filter zerto.event.dr.restore>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["process"]
    "event.type"     ["change"]
  </record>
</filter>

<filter zerto.event.vra>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["host","configuration"]
    "event.type"     ["change"]
  </record>
</filter>

<filter zerto.event.replication>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["network","storage"]
    "event.type"     ["info"]
  </record>
</filter>

<filter zerto.event.ltr>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["storage"]
    "event.type"     ["info"]
  </record>
</filter>

<filter zerto.event.task>
  @type record_transformer
  enable_ruby true
  <record>
    "event.kind"     ${record['event.code'] =~ /FAILED|CANCELLED/i ? 'alert' : 'event'}
    "event.category" ["process"]
    "event.type"     ["info"]
    "event.outcome"  ${record['event.code'] =~ /FAILED/i ? 'failure' : record['event.code'] =~ /CANCELLED/i ? 'unknown' : 'success'}
  </record>
</filter>

<filter zerto.event.**>
  @type record_transformer
  <record>
    "event.kind"     ${record['event.kind'] || 'event'}
    "event.category" ${record['event.category'] || ['network']}
  </record>
</filter>
