# ==============================================================
# Zerto SIEM Bridge — CEF parsing + ECS normalisation
#
# Zerto ZVM emits RFC-5424 syslog with a CEF payload:
#   <PRI>TIMESTAMP HOSTNAME CEF:0|Zerto|ZVM|VERSION|EVENT_ID|EVENT_NAME|SEV|ext
#
# Extensions (key=value) vary by event type. Common fields:
#   vpgName, vmName, siteName, alertType, entityType, entityName,
#   description, rpoInSeconds, journalUsedStorageGb, src, dst
# ==============================================================

# --------------------------------------------------------------
# Step 1: Parse raw syslog envelope + extract CEF header fields
# --------------------------------------------------------------
<filter zerto.raw>
  @type parser
  @id   parse_cef_envelope
  key_name message
  reserve_data true
  inject_key_prefix raw.

  <parse>
    @type regexp
    # Matches: <PRI>TIMESTAMP HOSTNAME CEF:0|Zerto|ZVM|VER|ID|NAME|SEV|extensions
    expression /^(?:<\d+>)?(?:\d{4}-\d{2}-\d{2}T[\d:\.]+Z?\s+|\w{3}\s+\d{1,2}\s+[\d:]+\s+)?(?<host\.name>[^\s]+)\s+CEF:(?<cef\.version>\d+)\|(?<observer\.vendor>[^|]+)\|(?<observer\.product>[^|]+)\|(?<observer\.version>[^|]+)\|(?<event\.code>[^|]+)\|(?<event\.action>[^|]+)\|(?<event\.severity_raw>\d+)\|(?<cef\.extensions>.*)$/
  </parse>
</filter>

# --------------------------------------------------------------
# Step 2: Drop anything that isn't a Zerto CEF message
# --------------------------------------------------------------
<filter zerto.raw>
  @type grep
  <regexp>
    key observer.vendor
    pattern /^Zerto$/i
  </regexp>
</filter>

# --------------------------------------------------------------
# Step 3: Parse CEF extension key=value pairs into flat fields
# --------------------------------------------------------------
<filter zerto.raw>
  @type record_modifier
  @id   parse_cef_extensions
  enable_ruby true

  <record>
    # Parse space-separated key=value, handling quoted values
    __ext__ ${
      ext = {}
      kv_str = record['cef.extensions'] || ''
      kv_str.scan(/(\w+)=((?:[^\s\\]|\\.)+)/) do |k, v|
        ext[k] = v.gsub(/\\=/, '=').gsub(/\\\\/, '\\')
      end
      ext
    }
  </record>
</filter>

# --------------------------------------------------------------
# Step 4: Map CEF extensions → ECS fields
# --------------------------------------------------------------
<filter zerto.raw>
  @type record_transformer
  @id   ecs_map
  enable_ruby true

  <record>
    # --- ECS Core ---
    "@timestamp"              ${time.strftime('%Y-%m-%dT%H:%M:%S.%LZ')}
    "ecs.version"             "8.11.0"
    "event.dataset"           "zerto.event"
    "event.module"            "zerto"
    "observer.vendor"         ${record['observer.vendor']}
    "observer.product"        ${record['observer.product']}
    "observer.version"        ${record['observer.version']}
    "host.name"               ${record['host.name']}
    "event.code"              ${record['event.code']}
    "event.action"            ${record['event.action']}

    # Map CEF severity (0-10) to ECS numeric severity and text
    "event.severity"          ${(record['event.severity_raw'] || '0').to_i * 10}
    "log.level"               ${
      sev = (record['event.severity_raw'] || '0').to_i
      case sev
      when 0..3  then 'informational'
      when 4..6  then 'warning'
      when 7..8  then 'error'
      else            'critical'
      end
    }

    # --- Zerto-specific fields (under labels namespace) ---
    "labels.vpg_name"         ${(record['__ext__'] || {})['vpgName']}
    "labels.vm_name"          ${(record['__ext__'] || {})['vmName']}
    "labels.site_name"        ${(record['__ext__'] || {})['siteName']}
    "labels.zorg_name"        ${(record['__ext__'] || {})['zorgName']}
    "labels.alert_type"       ${(record['__ext__'] || {})['alertType']}
    "labels.entity_type"      ${(record['__ext__'] || {})['entityType']}
    "labels.entity_name"      ${(record['__ext__'] || {})['entityName']}
    "labels.rpo_seconds"      ${(record['__ext__'] || {})['rpoInSeconds']}
    "labels.rpo_threshold"    ${(record['__ext__'] || {})['rpoThreshold']}
    "labels.journal_used_gb"  ${(record['__ext__'] || {})['journalUsedStorageGb']}
    "labels.journal_limit_gb" ${(record['__ext__'] || {})['journalHardLimitGb']}
    "labels.recovery_type"    ${(record['__ext__'] || {})['recoveryType']}
    "labels.failover_type"    ${(record['__ext__'] || {})['failoverType']}

    # --- Network (if present) ---
    "source.ip"               ${(record['__ext__'] || {})['src']}
    "destination.ip"          ${(record['__ext__'] || {})['dst']}
    "source.user.name"        ${(record['__ext__'] || {})['suser']}

    # --- Message ---
    "message"                 ${(record['__ext__'] || {})['msg'] || record['event.action']}
  </record>

  # Remove intermediate fields
  remove_keys __ext__, cef.extensions, event.severity_raw, raw.message
</filter>

# --------------------------------------------------------------
# Step 5: Route by Zerto event.code → semantic tags
# (mirrors the Alletra rewrite-tag-filter pattern)
# --------------------------------------------------------------
<match zerto.raw>
  @type rewrite_tag_filter
  @id   route_by_event_code

  # VPG lifecycle
  <rule>
    key   event.code
    pattern /^(VPG_CREATED|VPG_DELETED|VPG_UPDATED|VPG_PROTECTION_STATE_CHANGED)$/i
    tag   zerto.event.vpg.lifecycle
  </rule>

  # RPO / SLA violations — high priority
  <rule>
    key   event.code
    pattern /^(VPG_RPO_VIOLATION|VPG_RPO_WARNING|SLA_VIOLATION)$/i
    tag   zerto.event.vpg.rpo_violation
  </rule>

  # Journal events
  <rule>
    key   event.code
    pattern /^(JOURNAL_HARD_LIMIT_REACHED|JOURNAL_SOFT_LIMIT_REACHED|JOURNAL_FULL)$/i
    tag   zerto.event.journal.limit
  </rule>

  # Failover / DR operations
  <rule>
    key   event.code
    pattern /^(FAILOVER_STARTED|FAILOVER_COMPLETED|FAILOVER_FAILED|MOVE_STARTED|MOVE_COMPLETED|TEST_FAILOVER_STARTED|TEST_FAILOVER_COMPLETED)$/i
    tag   zerto.event.dr.operation
  </rule>

  # Authentication / user events
  <rule>
    key   event.code
    pattern /^(USER_LOGIN|USER_LOGOUT|USER_LOGIN_FAILED|USER_CREATED|USER_DELETED|USER_MODIFIED)$/i
    tag   zerto.event.auth
  </rule>

  # Configuration changes
  <rule>
    key   event.code
    pattern /^(CONFIG_CHANGED|LICENSE_CHANGED|SITE_PAIRING_CHANGED|ZVM_SETTINGS_CHANGED)$/i
    tag   zerto.event.config
  </rule>

  # Alerts / warnings
  <rule>
    key   event.code
    pattern /^(ALERT_RAISED|ALERT_CLEARED|WARNING_RAISED)$/i
    tag   zerto.event.alert
  </rule>

  # Connectivity
  <rule>
    key   event.code
    pattern /^(SITE_CONNECTED|SITE_DISCONNECTED|VRA_CONNECTED|VRA_DISCONNECTED)$/i
    tag   zerto.event.connectivity
  </rule>

  # Catch-all
  <rule>
    key   event.code
    pattern /.*/
    tag   zerto.event.other
  </rule>
</match>

# --------------------------------------------------------------
# Step 6: Enrich with event.kind / event.category by tag
# (adds SIEM-friendly classification after routing)
# --------------------------------------------------------------
<filter zerto.event.vpg.rpo_violation>
  @type record_transformer
  <record>
    "event.kind"     "alert"
    "event.category" ["network","storage"]
    "event.type"     ["info"]
    "rule.category"  "rpo_violation"
  </record>
</filter>

<filter zerto.event.journal.limit>
  @type record_transformer
  <record>
    "event.kind"     "alert"
    "event.category" ["storage"]
    "event.type"     ["info"]
    "rule.category"  "journal_limit"
  </record>
</filter>

<filter zerto.event.dr.operation>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["process"]
    "event.type"     ["change"]
  </record>
</filter>

<filter zerto.event.auth>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["authentication","iam"]
    "event.type"     ["start"]
  </record>
</filter>

<filter zerto.event.auth>
  @type record_transformer
  enable_ruby true
  <record>
    "event.outcome"  ${record['event.code'] =~ /FAILED/i ? 'failure' : 'success'}
    "event.kind"     ${record['event.code'] =~ /FAILED/i ? 'alert' : 'event'}
  </record>
</filter>

<filter zerto.event.config>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["configuration"]
    "event.type"     ["change"]
  </record>
</filter>

<filter zerto.event.alert>
  @type record_transformer
  <record>
    "event.kind"     "alert"
    "event.category" ["network"]
    "event.type"     ["indicator"]
  </record>
</filter>

<filter zerto.event.connectivity>
  @type record_transformer
  <record>
    "event.kind"     "event"
    "event.category" ["network"]
    "event.type"     ["connection"]
  </record>
</filter>

<filter zerto.event.**>
  @type record_transformer
  <record>
    "event.kind"     ${record['event.kind'] || 'event'}
    "event.category" ${record['event.category'] || ['network']}
  </record>
</filter>
