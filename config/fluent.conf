# ==============================================================
# Zerto SIEM Bridge — FluentD main config
# ==============================================================

<system>
  log_level info
  <log>
    rotate_age 7
    rotate_size 52428800
  </log>
</system>

# ==============================================================
# Prometheus metrics endpoint
# ==============================================================
<source>
  @type prometheus
  bind 0.0.0.0
  port 24231
  metrics_path /metrics
</source>

<source>
  @type prometheus_output_monitor
</source>

# ==============================================================
# Source: Syslog over TLS (TCP 6514)
# ==============================================================
<source>
  @type syslog
  @id   in_syslog_tls
  tag   zerto.raw

  port  6514
  bind  0.0.0.0

  message_length_limit 65536

  <transport tls>
    cert_path                  "#{ENV['TLS_CERT_PATH']}"
    private_key_path           "#{ENV['TLS_KEY_PATH']}"
    private_key_passphrase     "#{ENV['FLUENTD_TLS_KEY_PASSPHRASE']}"
    client_cert_auth           false
    version                    TLS1_2
  </transport>

  <parse>
    @type none
  </parse>
</source>

# ==============================================================
# Source: Plain syslog UDP/TCP 514 (dev / non-TLS environments)
# ==============================================================
<source>
  @type syslog
  @id   in_syslog_plain
  tag   zerto.raw

  port  514
  bind  0.0.0.0
  protocol_type both

  message_length_limit 65536

  <parse>
    @type none
  </parse>
</source>

# ==============================================================
# Parsing + ECS normalisation
# ==============================================================
@include /etc/fluent/zerto_parse.conf

# ==============================================================
# SIEM outputs (assembled by entrypoint.sh from env vars)
# ==============================================================
<match zerto.event.**>
  @type copy
  @include /etc/fluent/outputs_active.conf
</match>

# ==============================================================
# Dead-letter: unknown / unparsed events go to stdout for debug
# ==============================================================
<match zerto.unknown>
  @type stdout
  @id   out_unknown
</match>
