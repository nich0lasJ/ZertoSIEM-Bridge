<store>
  @type http
  @id   out_sentinelone

  endpoint "#{ENV['S1_INGEST_URL']}"
  http_method post
  content_type application/json

  # SentinelOne Bearer token auth
  headers {"Authorization": "Bearer #{ENV['S1_API_TOKEN']}"}

  # Send as JSON array for batch ingest
  json_array true

  error_response_as_unrecoverable false

  <buffer>
    @type file
    path /var/log/fluentd/buffer/sentinelone
    flush_mode interval
    flush_interval 10s
    flush_at_shutdown true
    retry_type exponential_backoff
    retry_wait 5s
    retry_max_interval 120s
    chunk_limit_size 4m
    total_limit_size 128m
    overflow_action block
  </buffer>
</store>
