<store>
  @type splunk_hec
  @id   out_splunk

  hec_host    "#{ENV['SPLUNK_HEC_URL']}"
  hec_token   "#{ENV['SPLUNK_HEC_TOKEN']}"

  index      "#{ENV['SPLUNK_INDEX']      || 'zerto'}"
  source     "#{ENV['SPLUNK_SOURCE']     || 'zerto:syslog'}"
  sourcetype "#{ENV['SPLUNK_SOURCETYPE'] || 'zerto:event'}"

  # Use event.severity for Splunk severity field
  fields_from_record
    severity    event.severity
    host        host.name
    vpg         labels.vpg_name

  # Timestamp from ECS @timestamp
  time_key "@timestamp"

  # Retry / buffer
  <buffer>
    @type file
    path /var/log/fluentd/buffer/splunk
    flush_mode interval
    flush_interval 5s
    flush_at_shutdown true
    retry_type exponential_backoff
    retry_wait 2s
    retry_max_interval 60s
    chunk_limit_size 8m
    total_limit_size 256m
    overflow_action block
  </buffer>
</store>
