<store>
  @type azure-loganalytics
  @id   out_sentinel

  customer_id "#{ENV['SENTINEL_WORKSPACE_ID']}"
  shared_key  "#{ENV['SENTINEL_WORKSPACE_KEY']}"
  log_type    "#{ENV['SENTINEL_LOG_TYPE'] || 'ZertoEvents'}"

  # Sentinel expects TimeGenerated for the timestamp field
  time_generated_field "@timestamp"

  <buffer>
    @type file
    path /var/log/fluentd/buffer/sentinel
    flush_mode interval
    flush_interval 10s
    flush_at_shutdown true
    retry_type exponential_backoff
    retry_wait 5s
    retry_max_interval 120s
    chunk_limit_size 8m
    total_limit_size 256m
    overflow_action block
  </buffer>
</store>
