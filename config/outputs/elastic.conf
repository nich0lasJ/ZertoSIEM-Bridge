<store>
  @type elasticsearch
  @id   out_elastic

  host   "#{ENV['ELASTIC_HOST']}"
  port   "#{ENV['ELASTIC_PORT'] || '9200'}"
  scheme "#{ENV['ELASTIC_SCHEME'] || 'https'}"

  # Auth: api_key takes precedence over user/password
  api_key  "#{ENV['ELASTIC_API_KEY']}"
  user     "#{ENV['ELASTIC_USER']}"
  password "#{ENV['ELASTIC_PASSWORD']}"

  index_name "#{ENV['ELASTIC_INDEX'] || 'zerto-siem-bridge'}"
  type_name  "_doc"

  # Use ILM for index lifecycle management
  enable_ilm true
  ilm_policy_id zerto-siem-bridge
  ilm_policy '{
    "policy": {
      "phases": {
        "hot":    { "actions": { "rollover": { "max_size": "10gb", "max_age": "7d" } } },
        "warm":   { "min_age": "7d",  "actions": { "shrink": { "number_of_shards": 1 } } },
        "delete": { "min_age": "90d", "actions": { "delete": {} } }
      }
    }
  }'

  # ECS compatibility
  include_timestamp true
  time_key "@timestamp"
  time_key_exclude_timestamp true

  # Bulk indexing
  bulk_message_request_threshold 10mb
  flush_interval 5s

  <buffer>
    @type file
    path /var/log/fluentd/buffer/elastic
    flush_mode interval
    flush_interval 5s
    flush_at_shutdown true
    retry_type exponential_backoff
    retry_wait 1s
    retry_max_interval 60s
    chunk_limit_size 8m
    total_limit_size 512m
    overflow_action block
  </buffer>
</store>
