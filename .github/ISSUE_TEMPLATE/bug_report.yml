name: Bug Report
description: Report a bug with the Zerto SIEM Bridge
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: Events are not forwarded to Splunk when...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      value: |
        1. Configure `.env` with...
        2. Run `docker compose up -d`
        3. Send events with...
        4. Observe that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happens instead?
    validations:
      required: true

  - type: dropdown
    id: siem
    attributes:
      label: SIEM output(s) affected
      description: Which SIEM output(s) does this affect?
      multiple: true
      options:
        - Elasticsearch
        - Splunk
        - Microsoft Sentinel
        - SentinelOne
        - stdout / all outputs
        - Not output-related
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Container logs
      description: |
        Paste relevant output from `docker logs zerto-siem-bridge`.
        Redact any credentials or sensitive information.
      render: text
    validations:
      required: false

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: |
        Please provide your environment details.
      value: |
        - Docker version:
        - Docker Compose version:
        - Host OS:
        - Zerto ZVM version:
        - Bridge image tag:
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: |
        Paste your `.env` file (with credentials redacted) or any relevant config changes.
      render: env
    validations:
      required: false
